<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人記帳簿</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS for Cute & Rounded Theme -->
    <style>
        body {
            background-color: #fff9f0; /* 溫暖的米黃底色 */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #5a4a42;
        }
        .navbar {
            background-color: #ffbba6 !important; /* 可愛粉橘色 */
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }
        .navbar-brand, .nav-link {
            color: #ffffff !important;
            font-weight: bold;
        }
        .card {
            border: none;
            border-radius: 20px; /* 圓角卡片 */
            box-shadow: 0 8px 15px rgba(0,0,0,0.05);
            background-color: #ffffff;
            margin-bottom: 20px;
        }
        .btn-primary {
            background-color: #ffcca5;
            border: none;
            border-radius: 25px; /* 圓角按鈕 */
            color: #5a4a42;
            font-weight: bold;
        }
        .btn-primary:hover {
            background-color: #ffa570;
            color: #ffffff;
        }
        .btn-danger {
            border-radius: 25px;
        }
        .form-control, .form-select {
            border-radius: 15px; /* 圓角輸入框 */
            background-color: #fafafa;
            border-color: #ffe0d0;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/">💰 個人記帳簿</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">首頁總覽</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/transactions/new">新增收支</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/stocks/new">新增股票</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Flash messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show" style="border-radius: 15px;" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
