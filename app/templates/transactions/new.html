{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card p-4">
            <h3 class="mb-4 text-center">✨ 新增收支紀錄</h3>
            <form action="{{ url_for('transaction.create_transaction') }}" method="POST">
                
                <div class="mb-3">
                    <label for="type" class="form-label">收支類型 <span class="text-danger">*</span></label>
                    <select class="form-select" id="type" name="type" required>
                        <option value="expense" {% if type == 'expense' %}selected{% endif %}>支出 (Expense)</option>
                        <option value="income" {% if type == 'income' %}selected{% endif %}>收入 (Income)</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="amount" class="form-label">金額 <span class="text-danger">*</span></label>
                    <input type="number" step="0.01" class="form-control" id="amount" name="amount" value="{{ amount or '' }}" required>
                </div>

                <div class="mb-3">
                    <label for="category" class="form-label">分類 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="category" name="category" placeholder="例如：飲食、交通、薪水" value="{{ category or '' }}" required>
                </div>

                <div class="mb-3">
                    <label for="date" class="form-label">日期 <span class="text-danger">*</span></label>
                    <input type="date" class="form-control" id="date" name="date" value="{{ date or '' }}" required>
                </div>

                <div class="mb-3">
                    <label for="description" class="form-label">備註</label>
                    <textarea class="form-control" id="description" name="description" rows="3">{{ description or '' }}</textarea>
                </div>

                <div class="d-grid gap-2 text-center mt-4">
                    <button type="submit" class="btn btn-primary btn-lg">儲存紀錄</button>
                    <a href="/" class="text-decoration-none" style="color: #a08c84;">取消並回首頁</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
